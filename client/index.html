<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic Voice Agent - Login</title>
    <link rel="stylesheet" href="css/index.css">

    <script defer src="js/index.js"></script>

</head>
<body>
    <div class="login-container">
        <div class="header">
            <div class="logo">🏥</div>
            <h1>Epic Voice Agent System</h1>
            <p class="subtitle">Select your profile to continue</p>
        </div>

        <div class="user-cards">
            <div class="user-card" onclick="selectUser('Dr. Sarah Mitchell', 'Physician')">
                <div class="user-icon">👩‍⚕️</div>
                <div class="user-name">Dr. Sarah Mitchell</div>
                <div class="user-role">Physician</div>
            </div>

            <div class="user-card" onclick="selectUser('James Rodriguez', 'Claims Manager')">
                <div class="user-icon">👨‍💼</div>
                <div class="user-name">James Rodriguez</div>
                <div class="user-role">Claims Manager</div>
            </div>

            <div class="user-card" onclick="selectUser('Emily Chen', 'Medical Billing Specialist')">
                <div class="user-icon">👩‍💻</div>
                <div class="user-name">Emily Chen</div>
                <div class="user-role">Medical Billing Specialist</div>
            </div>

            <div class="user-card" onclick="selectUser('Michael Thompson', 'Patient Advocate')">
                <div class="user-icon">👨‍⚕️</div>
                <div class="user-name">Michael Thompson</div>
                <div class="user-role">Patient Advocate</div>
            </div>

            <div class="user-card" onclick="selectUser('Lisa Anderson', 'Administrator')">
                <div class="user-icon">👩‍💼</div>
                <div class="user-name">Lisa Anderson</div>
                <div class="user-role">Administrator</div>
            </div>
        </div>
    </div>
</body>
</html>
