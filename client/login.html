<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Epic Voice Agent — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #4f8ef7;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: #666;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 12px 14px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f8ef7; }

    button {
      width: 100%;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a7ae0; }
    button:disabled { background: #2a2d3a; cursor: not-allowed; }

    .error {
      color: #f87171;
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡ Epic Voice Agent</div>
    <div class="subtitle">Medical Billing Specialist Dashboard</div>

    <label>Email</label>
    <input type="email" id="username" placeholder="admin@epicvoice.com" />

    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button id="loginBtn" onclick="login()">Sign In</button>
    <div class="error" id="error">Invalid email or password.</div>
  </div>

  <script>
    // If already logged in, skip to dashboard
    if (sessionStorage.getItem("auth_token")) {
      window.location.href = "/";
    }

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const btn = document.getElementById("loginBtn");
      const error = document.getElementById("error");

      btn.disabled = true;
      btn.textContent = "Signing in...";
      error.style.display = "none";

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error);

        sessionStorage.setItem("auth_token", data.token);
        window.location.href = "/";
      } catch (err) {
        error.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
